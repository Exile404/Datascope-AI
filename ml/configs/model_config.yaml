# DataScope AI — Model Configuration

base_model:
  name: "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
  family: "llama3"
  max_seq_length: 2048

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

inference:
  temperature: 0.3
  top_p: 0.9
  top_k: 50
  max_new_tokens: 512
  repetition_penalty: 1.15

export:
  merge_adapters: true
  formats:
    - "safetensors"
    - "gguf_q4_k_m"
  output_dir: "./models/datascope-analyst"
  hub_repo: null